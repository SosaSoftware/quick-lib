name: Version and Tagging

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: version-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.REPOSITORY_ACCESS_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Determine version bump
        id: bump
        run: |
          set -euo pipefail

          commit_message="$(git log -1 --pretty=%s)"
          commit_message="$(printf '%s' "$commit_message" | sed -E 's/ \(#[0-9]+\)$//')"

          if printf '%s\n' "$commit_message" | grep -Eq '^chore: bump version to [0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "bump=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if printf '%s\n' "$commit_message" | grep -Eq '^[a-z]+(\([a-z0-9._-]+\))?!: .+'; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "bump=major" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if printf '%s\n' "$commit_message" | grep -Eq '^feat(\([a-z0-9._-]+\))?: .+'; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "bump=minor" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if printf '%s\n' "$commit_message" | grep -Eq '^fix(\([a-z0-9._-]+\))?: .+'; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "bump=patch" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=true" >> "$GITHUB_OUTPUT"
          echo "bump=" >> "$GITHUB_OUTPUT"

      - name: Read current version
        if: steps.bump.outputs.skip != 'true'
        id: current
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Bump package version
        if: steps.bump.outputs.skip != 'true'
        id: next
        env:
          BUMP: ${{ steps.bump.outputs.bump }}
        run: |
          set -euo pipefail
          npm version "$BUMP" --no-git-tag-version
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Commit version update
        if: steps.bump.outputs.skip != 'true' && steps.current.outputs.version != steps.next.outputs.version
        env:
          NEW_VERSION: ${{ steps.next.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "Quick Bot"
          git config user.email "quick.bot@github.com"
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${NEW_VERSION}"
          git push origin HEAD:main

      - name: Create major tag
        if: steps.bump.outputs.bump == 'major' && steps.current.outputs.version != steps.next.outputs.version
        env:
          NEW_VERSION: ${{ steps.next.outputs.version }}
        run: |
          set -euo pipefail
          git fetch --tags
          if git rev-parse "v${NEW_VERSION}" >/dev/null 2>&1; then
            echo "Tag v${NEW_VERSION} already exists."
            exit 0
          fi
          git tag "v${NEW_VERSION}"
          git push origin "v${NEW_VERSION}"
